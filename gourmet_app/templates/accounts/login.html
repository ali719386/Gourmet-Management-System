<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Ahmad Traders</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: url("https://foodstreethalal.com/wp-content/uploads/2024/03/Red-Soft-Drinks-Hd-Wallpaper.jpg") no-repeat center center fixed;
      background-size: cover;
    }
    .login-box {
      background: rgba(255, 255, 255, 0.85);
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0px 4px 15px rgba(0,0,0,0.3);
      text-align: center;
    }
    .login-logo {
      width: 120px;          /* size adjust kar sakte ho */
      height: 120px;
      border-radius: 50%;    /* round banayega */
      object-fit: cover;      /* image distort na ho */
      margin-bottom: 20px;
      border: 3px solid #fff; /* optional: white border */
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="row justify-content-center mt-5">
      <div class="col-md-4">
        <div class="login-box">
          <!-- Round Logo -->
          <img src="https://www.shutterstock.com/image-vector/creative-arabic-calligraphy-name-ahmed-260nw-1742711456.jpg" 
               alt="Ahmad Traders Logo" class="login-logo">

          <h3 class="mb-3">Login</h3>
          <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button class="btn btn-primary w-100" type="submit">Login</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
