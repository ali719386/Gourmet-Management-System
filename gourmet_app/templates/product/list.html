{% extends 'base.html' %}
{% block content %}
<div class="container mt-4">
  <div class="card shadow-sm border-0">
    <div class="card-header bg-primary text-white">
      <h3 class="mb-0">📦 Products</h3>
    </div>
    <div class="card-body">
      <!-- Form -->
      <form method="post" class="mb-4">
        {% csrf_token %}
        <div class="mb-3">
          {{ form.as_p }}
        </div>
        <button class="btn btn-success px-4" type="submit">➕ Add Product</button>
      </form>

      <!-- Product List -->
      <h5 class="mb-3">📝 Product List</h5>
      <ul class="list-group">
        {% for p in products %}
          <li class="list-group-item d-flex justify-content-between align-items-center">
            {{ p }}
            <span class="badge bg-info text-dark">Active</span>
          </li>
        {% empty %}
          <li class="list-group-item text-muted">No products available</li>
        {% endfor %}
      </ul>
    </div>
  </div>
</div>
{% endblock %}
